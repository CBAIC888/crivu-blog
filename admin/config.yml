# 本檔為可讀性備份；實際運行的 CMS 配置在 admin/config.js。
# 修改請兩邊同步，勿僅改此檔。
backend:
  name: github
  repo: CBAIC888/crivu-blog
  branch: main
  base_url: https://cbc688.com
  auth_endpoint: /api/auth
  commit_messages:
    create: "content: create {{collection}} '{{slug}}'"
    update: "content: update {{collection}} '{{slug}}'"
    delete: "content: delete {{collection}} '{{slug}}'"
    uploadMedia: "media: upload '{{path}}'"
    deleteMedia: "media: delete '{{path}}'"

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"
media_library:
  name: "crivu-r2-images"
publish_mode: editorial_workflow
logo_url: "/assets/img/favicon.png"
display_url: "https://cbc688.com"

collections:
  - name: "posts"
    label: "文章"
    label_singular: "文章"
    description: "管理所有文章。"
    sortable_fields: ["commit_date", "commit_author"]
    files:
      - name: "posts"
        label: "文章列表"
        file: "posts/posts.json"
        format: "json"
        fields:
          - label: "文章"
            name: "items"
            widget: "list"
            label_singular: "文章"
            summary: "{{fields.date | date('YYYY-MM-DD')}} · {{fields.title}}"
            collapsed: true
            minimize_collapsed: true
            add_to_top: true
            fields:
              - { label: "標題", name: "title", widget: "string" }
              - { label: "日期", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "YYYY-MM-DD", time_format: "HH:mm", picker_utc: false }
              - { label: "分類", name: "category", widget: "string", required: false }
              - { label: "標籤", name: "tags", widget: "list", required: false, allow_add: true }
              - { label: "摘要", name: "excerpt", widget: "text", required: false }
              - { label: "封面", name: "cover", widget: "image", required: false }
              - { label: "期刊 ID", name: "issue", widget: "string", required: false }
              - { label: "Slug", name: "slug", widget: "string" }
              - { label: "內文", name: "body", widget: "markdown", hint: "支援 Markdown，可直接寫 **粗體**、## 標題、> 引用、- 列表；右側可即時預覽，發布後文章也可切換查看 Markdown 原文。" }

  - name: "issues"
    label: "期刊"
    label_singular: "期刊"
    sortable_fields: ["commit_date", "commit_author"]
    files:
      - name: "issues"
        label: "期刊列表"
        file: "posts/issues.json"
        format: "json"
        fields:
          - label: "期刊"
            name: "issues"
            widget: "list"
            summary: "{{fields.id}} · {{fields.title}}"
            collapsed: true
            minimize_collapsed: true
            fields:
              - { label: "期刊 ID", name: "id", widget: "string" }
              - { label: "標題", name: "title", widget: "string" }
              - { label: "主題", name: "theme", widget: "string", required: false }
              - { label: "封面", name: "cover", widget: "image", required: false }
              - { label: "發布日期", name: "publishDate", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "YYYY-MM-DD", time_format: "HH:mm", picker_utc: false, required: false }
              - { label: "編者語", name: "editorNote", widget: "text", required: false }
              - label: "收錄文章（Slug 列表）"
                name: "posts"
                widget: "list"
                required: false
                allow_add: true
                collapsed: false
                field: { label: "文章 Slug", name: "slug", widget: "string" }

  - name: "site"
    label: "站點設定"
    label_singular: "站點設定"
    description: "欄位以「基本/導航/主題/首頁/文章頁/期刊頁/關於頁/舊版」前綴分組。"
    sortable_fields: ["commit_date", "commit_author"]
    files:
      - name: "site"
        label: "站點資訊"
        file: "posts/site.json"
        format: "json"
        fields:
          # 基本
          - { label: "「基本」站名", name: "siteName", widget: "string" }
          - { label: "「基本」網站描述", name: "siteDescription", widget: "text", required: false }
          - { label: "「基本」關鍵字", name: "siteKeywords", widget: "string", required: false }
          - { label: "「基本」Favicon", name: "favicon", widget: "image", required: false }
          - { label: "「基本」OG Image", name: "ogImage", widget: "image", required: false }
          - { label: "「基本」底部文案", name: "footerText", widget: "string" }
          # 導航
          - label: "「導航」導航項目"
            name: "nav"
            widget: "list"
            required: false
            summary: "{{fields.label}} → {{fields.href}}"
            fields:
              - { label: "名稱", name: "label", widget: "string" }
              - { label: "連結", name: "href", widget: "string" }
          - { label: "「導航」搜尋框提示文字", name: "searchPlaceholder", widget: "string", required: false }
          # 主題
          - label: "「主題」預設配色"
            name: "themeDefault"
            widget: "select"
            required: false
            default: "white"
            options:
              - { label: "白色", value: "white" }
              - { label: "紙黃", value: "light" }
              - { label: "深色", value: "dark" }
          - { label: "「主題」顯示切換按鈕", name: "themeToggleEnabled", widget: "boolean", required: false, default: true }
          - { label: "「主題」品牌強調色", name: "accentColor", widget: "string", required: false, default: "#9f3c3c" }
          # 首頁
          - { label: "「首頁」焦點期刊 ID", name: "homeFeaturedIssueId", widget: "string", required: false }
          - { label: "「首頁」小標", name: "homeKicker", widget: "string", required: false }
          - { label: "「首頁」主標", name: "homeTitle", widget: "string", required: false }
          - { label: "「首頁」副標", name: "homeSubtitle", widget: "text", required: false }
          - { label: "「首頁」背景圖（保留）", name: "homeHeroImage", widget: "image", required: false }
          - { label: "「首頁」最新文章標題", name: "latestTitle", widget: "string", required: false }
          - { label: "「首頁」最新文章說明", name: "latestIntro", widget: "text", required: false }
          - { label: "「首頁」最新文章篇數", name: "homeLatestLimit", widget: "number", value_type: "int", required: false, min: 1, max: 30, default: 4 }
          # 文章頁
          - { label: "「文章頁」標題", name: "articlesPageTitle", widget: "string", required: false }
          - { label: "「文章頁」說明", name: "articlesPageIntro", widget: "text", required: false }
          - { label: "「文章頁」更多閱讀標題", name: "moreReadingTitle", widget: "string", required: false }
          - { label: "「文章頁」更多閱讀數量", name: "moreReadingLimit", widget: "number", value_type: "int", required: false, min: 1, max: 12 }
          # 期刊頁
          - { label: "「期刊頁」標題", name: "issuesPageTitle", widget: "string", required: false }
          - { label: "「期刊頁」說明", name: "issuesPageIntro", widget: "text", required: false }
          - { label: "「期刊頁」文章數模板", name: "issueCountTemplate", widget: "string", required: false }
          - { label: "「期刊頁」空內容提示", name: "issueEmptyText", widget: "string", required: false }
          - { label: "「期刊頁」詳情按鈕", name: "issueExpandLabel", widget: "string", required: false }
          # 關於頁
          - { label: "「關於頁」小標", name: "aboutKicker", widget: "string", required: false }
          - { label: "「關於頁」標題", name: "aboutTitle", widget: "string" }
          - { label: "「關於頁」主敘述", name: "aboutIntro", widget: "text" }
          - { label: "「關於頁」附註", name: "aboutStyle", widget: "text", required: false }
          - { label: "「關於頁」資訊區塊標題", name: "aboutInfoTitle", widget: "string", required: false }
          - { label: "「關於頁」聯絡按鈕文字", name: "aboutMailLabel", widget: "string", required: false }
          - { label: "「關於頁」城市欄位", name: "aboutCityLabel", widget: "string", required: false }
          - { label: "「關於頁」城市內容", name: "city", widget: "string", required: false }
          - { label: "「關於頁」Email 欄位", name: "aboutEmailLabel", widget: "string", required: false }
          - { label: "「關於頁」Email", name: "email", widget: "string", required: false }
          - { label: "「關於頁」主題欄位", name: "aboutTopicsLabel", widget: "string", required: false }
          - { label: "「關於頁」主題內容", name: "topics", widget: "string", required: false }
          # 舊版
          - { label: "「舊版」首頁主按鈕文字", name: "homeLatestButtonText", widget: "string", required: false }
          - { label: "「舊版」首頁期刊 kicker", name: "homeIssueKicker", widget: "string", required: false }
          - { label: "「舊版」首頁 Credit 行 1", name: "homeHeroCreditLine1", widget: "string", required: false }
          - { label: "「舊版」首頁 Credit 行 2", name: "homeHeroCreditLine2", widget: "string", required: false }
          - { label: "「舊版」首頁卡片欄數", name: "homeCardsDesktop", widget: "number", value_type: "int", required: false, min: 1, max: 4 }
          - { label: "「舊版」文章頁卡片欄數", name: "articleCardsDesktop", widget: "number", value_type: "int", required: false, min: 1, max: 4 }
          - { label: "「舊版」卡片最多標籤數", name: "maxTagsPerCard", widget: "number", value_type: "int", required: false, min: 1, max: 10 }
          - { label: "「舊版」全部分類文字", name: "allCategoryLabel", widget: "string", required: false }
          - { label: "「舊版」全部標籤文字", name: "allTagLabel", widget: "string", required: false }
          - { label: "「舊版」期刊首篇按鈕", name: "issueReadLabel", widget: "string", required: false }
          - { label: "「舊版」期刊文章頁按鈕", name: "issueBrowseLabel", widget: "string", required: false }
          - { label: "「舊版」期刊詳情預設展開", name: "issueDetailsOpen", widget: "boolean", required: false, default: false }
