<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRIVU</title>
  <meta name="description" content="CRIVU" />
  <link rel="stylesheet" href="/assets/css/style.css?v=20260429ui19" />
  <link rel="icon" href="/assets/img/favicon.png" type="image/png" />
</head>
<body class="home-page">
  <header class="site-header">
    <a class="logo" id="siteName" href="/">CRIVU</a>
    <nav class="nav">
      <a href="/">首頁</a>
      <a href="/issues.html">期刊</a>
      <a href="/articles.html">文章</a>
      <a href="/about.html">關於</a>
    </nav>
    <div class="header-actions">
      <div class="search-box">
        <input id="searchInput" class="search-input" type="search" placeholder="搜尋" />
        <div id="searchResults" class="search-results"></div>
      </div>
      <button class="mobile-search-toggle" id="mobileSearchBtn" aria-label="搜尋">🔍</button>
      <button class="mobile-menu-toggle" id="mobileMenuBtn" aria-label="展開選單">☰</button>
    </div>
  </header>

  <main>
    <section class="hero hero-magazine" id="homeHero">
      <div class="hero-backdrop" id="homeHeroBackdrop">
        <img id="homeHeroBackdropImage" class="hero-backdrop-image" src="/assets/img/uploads/程派—春閨夢-3-.png" alt="" />
      </div>
      <div class="hero-frame hero-frame--book-only">
        <div class="hero-copy">
          <p class="kicker" id="homeKicker" hidden></p>
          <h1 id="homeTitle" hidden></h1>
          <p class="subtitle" id="homeSubtitle" hidden></p>
          <div class="hero-cta">
            <a class="btn" id="homeLatestButton" href="#latest">最新文章</a>
          </div>
          <p class="hero-note" id="homeHeroNote" hidden></p>
        </div>
        <aside class="hero-book">
          <a class="book-link" id="homeIssueLink" href="/issues.html" aria-label="查看推薦期刊">
            <div class="book-object">
              <div class="book-spine"></div>
              <div class="book-cover" id="homeIssueCover">
                <img id="homeIssueCoverImage" class="book-cover-image" src="/assets/img/uploads/未命名設計-1-.png" alt="" />
                <div class="book-cover-copy">
                  <div class="book-kicker" id="homeIssueKicker">Featured Issue</div>
                  <h2 id="homeIssueTitle">二十四節氣</h2>
                  <p id="homeIssueMeta">傳統-書信 · 2026-02-11</p>
                </div>
              </div>
              <div class="book-shadow"></div>
            </div>
          </a>
        </aside>
      </div>
      <div class="hero-credit" id="homeHeroCredit" hidden></div>
    </section>

    <section id="latest" class="latest latest-list">
      <div class="section-title">
        <div>
          <h2 id="latestTitle">最新文章</h2>
          <p id="latestIntro">按時間展開近期更新。</p>
        </div>
        <div class="filters">
          <select id="categoryFilter" aria-label="分類篩選"></select>
          <select id="tagFilter" aria-label="標籤篩選"></select>
        </div>
      </div>
      <div id="postGrid" class="post-grid list-mode"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div id="siteFooterText">© 2026 CRIVU</div>
  </footer>

  <script src="/assets/js/app.js?v=20260429ui04" type="module"></script>
</body>
</html>
